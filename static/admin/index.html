<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin - Intro al Desarrollo de Software</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      var isLocal = document.location.hostname === "localhost" || document.location.hostname === "127.0.0.1";

      CMS.init({
        config: {
          backend: isLocal
            ? { name: "proxy", proxy_url: "http://localhost:8081/api/v1" }
            : {
                name: "github",
                repo: "intro-camejo/web",
                branch: "main",
                base_url: "https://decap-cms-github-auth-production.up.railway.app",
                commit_messages: {
                  create: "contenido: crear {{collection}} — {{slug}}",
                  update: "contenido: actualizar {{collection}} — {{slug}}",
                  delete: "contenido: eliminar {{collection}} — {{slug}}",
                  uploadMedia: "media: subir {{path}}",
                  deleteMedia: "media: eliminar {{path}}",
                },
              },
          media_folder: "static/img",
          public_folder: "/img/",
          collections: [
            {
              name: "trabajos-practicos",
              label: "Trabajos Prácticos",
              editor: { preview: false },
              files: [
                {
                  name: "trabajos-practicos",
                  label: "Trabajos Prácticos",
                  file: "src/pages/trabajos-practicos.md",
                  fields: [
                    { label: "Contenido", name: "body", widget: "markdown" },
                  ],
                },
              ],
            },
            {
              name: "regimen-cursada",
              label: "Régimen de Cursada",
              editor: { preview: false },
              files: [
                {
                  name: "regimen-cursada",
                  label: "Régimen de Cursada",
                  file: "src/pages/regimen-cursada.md",
                  fields: [
                    { label: "Contenido", name: "body", widget: "markdown" },
                  ],
                },
              ],
            },
            {
              name: "docentes",
              label: "Docentes",
              editor: { preview: false },
              files: [
                {
                  name: "docentes",
                  label: "Docentes",
                  file: "src/data/docentes.json",
                  fields: [
                    {
                      label: "Docentes",
                      name: "docentes",
                      widget: "list",
                      allow_add: true,
                      fields: [
                        { label: "Nombre", name: "name", widget: "string" },
                        {
                          label: "Fotos",
                          name: "pictures",
                          widget: "list",
                          field: { label: "Foto", name: "foto", widget: "image" },
                        },
                      ],
                    },
                  ],
                },
              ],
            },
            {
              name: "cronograma",
              label: "Cronograma",
              editor: { preview: false },
              files: [
                {
                  name: "cronograma",
                  label: "Cronograma",
                  file: "src/data/cronograma.json",
                  fields: [
                    { label: "Introducción", name: "intro", widget: "markdown" },
                    {
                      label: "Semanas",
                      name: "semanas",
                      widget: "list",
                      fields: [
                        { label: "Semana", name: "semana", widget: "number", value_type: "int" },
                        {
                          label: "Martes",
                          name: "martes",
                          widget: "object",
                          fields: [
                            { label: "Fecha", name: "fecha", widget: "string", hint: "DD/MM/AAAA" },
                            {
                              label: "Actividades",
                              name: "actividades",
                              widget: "list",
                              fields: [
                                { label: "Nombre", name: "name", widget: "string" },
                                { label: "Color de fondo", name: "bg", widget: "string", required: false, hint: "ej: #0070a7" },
                                { label: "Color de texto", name: "color", widget: "string", required: false, hint: "ej: #f7f7f7" },
                              ],
                            },
                          ],
                        },
                        {
                          label: "Jueves",
                          name: "jueves",
                          widget: "object",
                          fields: [
                            { label: "Fecha", name: "fecha", widget: "string", hint: "DD/MM/AAAA" },
                            {
                              label: "Actividades",
                              name: "actividades",
                              widget: "list",
                              fields: [
                                { label: "Nombre", name: "name", widget: "string" },
                                { label: "Color de fondo", name: "bg", widget: "string", required: false, hint: "ej: #0070a7" },
                                { label: "Color de texto", name: "color", widget: "string", required: false, hint: "ej: #f7f7f7" },
                              ],
                            },
                          ],
                        },
                      ],
                    },
                  ],
                },
              ],
            },
            {
              name: "material-root",
              label: "Material de Catedra",
              editor: { preview: false },
              files: [
                {
                  name: "index",
                  label: "Inicio (Material)",
                  file: "docs/Material/index.md",
                  fields: [
                    { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false, value_type: "int" },
                    { label: "Contenido", name: "body", widget: "markdown" },
                  ],
                },
                {
                  name: "diapos",
                  label: "Diapos",
                  file: "docs/Material/Diapos.md",
                  fields: [
                    { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false },
                    { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false, value_type: "int" },
                    { label: "Contenido", name: "body", widget: "markdown" },
                  ],
                },
                {
                  name: "material-complementario",
                  label: "Material Complementario",
                  file: "docs/Material/Material-complementario.md",
                  fields: [
                    { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false },
                    { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false, value_type: "int" },
                    { label: "Contenido", name: "body", widget: "markdown" },
                  ],
                },
              ],
            },
            {
              name: "apuntes",
              label: "Apuntes",
              folder: "docs/Material/Apuntes",
              create: true,
              extension: "md",
              summary: "{{filename}}",
              editor: { preview: false },
              fields: [
                { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false },
                { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false, value_type: "int" },
                { label: "Contenido", name: "body", widget: "markdown" },
              ],
            },
            {
              name: "clases",
              label: "Clases",
              folder: "docs/Material/Clases",
              create: true,
              extension: "md",
              summary: "{{filename}}",
              editor: { preview: false },
              fields: [
                { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false },
                { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false, value_type: "int" },
                { label: "Contenido", name: "body", widget: "markdown" },
              ],
            },
            {
              name: "guias",
              label: "Guías",
              folder: "docs/Material/Guias",
              create: true,
              extension: "md",
              summary: "{{filename}}",
              editor: { preview: false },
              fields: [
                { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false },
                { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false, value_type: "int" },
                { label: "Contenido", name: "body", widget: "markdown" },
              ],
            },
          ],
        },
      });

      // Image previews: /img/ paths are already correct with baseUrl = /
    </script>
  </body>
</html>
