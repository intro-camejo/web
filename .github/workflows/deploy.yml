name: Deploy redirect to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy redirect to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build redirect page
        run: |
          mkdir -p build
          cat > build/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>Redirigiendo...</title>
            <meta http-equiv="refresh" content="0; url=https://www.intro-camejo.com.ar/">
            <link rel="canonical" href="https://www.intro-camejo.com.ar/">
          </head>
          <body>
            <p>Redirigiendo a <a href="https://www.intro-camejo.com.ar/">www.intro-camejo.com.ar</a>...</p>
          </body>
          </html>
          HTMLEOF
          cat > build/404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>Redirigiendo...</title>
            <meta http-equiv="refresh" content="0; url=https://www.intro-camejo.com.ar/">
            <link rel="canonical" href="https://www.intro-camejo.com.ar/">
          </head>
          <body>
            <p>Redirigiendo a <a href="https://www.intro-camejo.com.ar/">www.intro-camejo.com.ar</a>...</p>
          </body>
          </html>
          HTMLEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
